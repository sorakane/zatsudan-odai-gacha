<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#14171f" />
    <meta
      name="description"
      content="飲み会や通話で使える、軽く話が広がる雑談お題ガチャです。"
    />
    <title>雑談お題ガチャ</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="style.css?v=14" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <h1>雑談お題ガチャ</h1>
        </div>
        <button class="icon-button" id="installButton" type="button" hidden>
          追加
        </button>
      </header>

      <main>
        <section class="view active" id="mainView" aria-labelledby="mainTitle">
          <h2 class="sr-only" id="mainTitle">メイン画面</h2>

          <article class="topic-panel" aria-live="polite">
            <div class="topic-meta">
              <span id="topicCategory">カテゴリ</span>
              <span id="topicDepth">深さ</span>
            </div>
            <p class="topic-text" id="topicText">
              下のボタンを押すと、雑談のお題が出ます。
            </p>
          </article>

          <section class="preset-picker" aria-label="場面選択">
            <div class="preset-picker-head">
              <span>場面</span>
            </div>
            <div class="preset-options" id="presetOptions"></div>
          </section>

          <section class="category-picker is-collapsed" aria-label="カテゴリ選択">
            <div class="category-picker-head">
              <span id="categorySummary">10カテゴリ選択中</span>
              <button
                class="text-button"
                id="categoryPanelButton"
                type="button"
                aria-expanded="false"
                aria-controls="categoryPickerBody"
              >
                カテゴリを選ぶ
              </button>
            </div>
            <div class="category-picker-body" id="categoryPickerBody" hidden>
              <div class="category-picker-actions">
                <span>カテゴリ</span>
                <button class="text-button" id="toggleCategoriesButton" type="button">
                  すべて外す
                </button>
              </div>
              <div class="category-checks" id="categoryChecks"></div>
            </div>
          </section>
          <p class="pool-text" id="poolText"></p>

          <section class="draw-actions" aria-label="ガチャ操作">
            <button class="primary-button" id="drawButton" type="button">
              選んだカテゴリから引く
            </button>
            <button class="secondary-button" id="anyCategoryButton" type="button">
              全カテゴリから引く
            </button>
          </section>
          <section class="topic-actions" aria-label="表示中のお題操作">
            <button id="favoriteButton" type="button">お気に入り</button>
            <button id="muteButton" type="button">今日は出さない</button>
          </section>
          <div class="utility-row">
            <button class="text-button" id="resetMutedButton" type="button">
              今日の非表示をリセット
            </button>
          </div>

          <p class="status-text" id="statusText"></p>
        </section>

        <section class="view" id="favoritesView" aria-labelledby="favoritesTitle">
          <div class="view-title-row">
            <h2 id="favoritesTitle">お気に入り</h2>
            <span id="favoritesCount">0件</span>
          </div>
          <div class="list" id="favoritesList"></div>
        </section>

        <section class="view" id="historyView" aria-labelledby="historyTitle">
          <div class="view-title-row">
            <h2 id="historyTitle">履歴</h2>
            <span id="historyCount">0件</span>
          </div>
          <div class="utility-row align-left">
            <button class="text-button" id="clearHistoryButton" type="button">
              履歴をクリア
            </button>
          </div>
          <div class="list" id="historyList"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="画面切り替え">
        <button class="nav-button active" type="button" data-view="mainView">
          ガチャに戻る
        </button>
        <button class="nav-button" type="button" data-view="favoritesView">
          お気に入り
        </button>
        <button class="nav-button" type="button" data-view="historyView">
          履歴
        </button>
      </nav>
    </div>

    <script src="app.js?v=14"></script>
  </body>
</html>
