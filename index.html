<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#14171f" />
    <meta
      name="description"
      content="飲み会や通話で使える、軽く話が広がる雑談お題ガチャです。"
    />
    <title>雑談お題ガチャ</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">PWA / local only</p>
          <h1>雑談お題ガチャ</h1>
        </div>
        <button class="icon-button" id="installButton" type="button" hidden>
          追加
        </button>
      </header>

      <main>
        <section class="view active" id="mainView" aria-labelledby="mainTitle">
          <h2 class="sr-only" id="mainTitle">メイン画面</h2>

          <article class="topic-panel" aria-live="polite">
            <div class="topic-meta">
              <span id="topicCategory">カテゴリ</span>
              <span id="topicDepth">深さ</span>
            </div>
            <p class="topic-text" id="topicText">
              下のボタンを押すと、雑談のお題が出ます。
            </p>
          </article>

          <section class="controls" aria-label="抽選条件">
            <label>
              カテゴリ
              <select id="categorySelect"></select>
            </label>
            <label>
              深さ
              <select id="depthSelect"></select>
            </label>
          </section>

          <section class="action-grid" aria-label="お題操作">
            <button class="primary-button" id="drawButton" type="button">
              ガチャを引く
            </button>
            <button id="favoriteButton" type="button">お気に入り</button>
            <button id="muteButton" type="button">今日は出さない</button>
          </section>

          <p class="status-text" id="statusText"></p>
        </section>

        <section class="view" id="favoritesView" aria-labelledby="favoritesTitle">
          <div class="view-title-row">
            <h2 id="favoritesTitle">お気に入り</h2>
            <span id="favoritesCount">0件</span>
          </div>
          <div class="list" id="favoritesList"></div>
        </section>

        <section class="view" id="historyView" aria-labelledby="historyTitle">
          <div class="view-title-row">
            <h2 id="historyTitle">履歴</h2>
            <span id="historyCount">0件</span>
          </div>
          <div class="list" id="historyList"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="画面切り替え">
        <button class="nav-button active" type="button" data-view="mainView">
          ガチャ
        </button>
        <button class="nav-button" type="button" data-view="favoritesView">
          お気に入り
        </button>
        <button class="nav-button" type="button" data-view="historyView">
          履歴
        </button>
      </nav>
    </div>

    <script src="app.js"></script>
  </body>
</html>
